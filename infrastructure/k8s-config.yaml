apiVersion: v1
kind: Namespace
metadata:
  name: rag-system

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: rag-config
  namespace: rag-system
data:
  environment: "production"
  debug: "false"
  log_level: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: rag-secrets
  namespace: rag-system
type: Opaque
stringData:
  database-url: "postgresql://user:password@postgres:5432/rag_system"
  redis-url: "redis://redis:6379/0"
  openai-api-key: "your-openai-api-key"
  secret-key: "your-secret-key"
