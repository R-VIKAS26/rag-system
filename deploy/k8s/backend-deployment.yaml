apiVersion: apps/v1
kind: Deployment
metadata:
  name: ragsystem-backend
  labels:
    app: ragsystem-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ragsystem-backend
  template:
    metadata:
      labels:
        app: ragsystem-backend
    spec:
      containers:
        - name: backend
          image: ragsystem-backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8000
          env:
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ragsystem-secrets
                  key: OPENAI_API_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ragsystem-secrets
                  key: ANTHROPIC_API_KEY
            - name: DATABASE_URL
              value: "postgresql://postgres:postgres@rag-postgres:5432/ragdb"
          readinessProbe:
            httpGet:
              path: /api/health/ready
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health/live
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 20

---
apiVersion: v1
kind: Service
metadata:
  name: ragsystem-backend
spec:
  selector:
    app: ragsystem-backend
  ports:
    - protocol: TCP
      port: 8000
      targetPort: 8000
  type: ClusterIP
